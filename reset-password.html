<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IvoryOS - Reset Password</title>
  <style>
    * { box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      background: #F8F6F0; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: 100vh; 
      margin: 0; 
      padding: 20px;
    }
    .container { 
      background: white; 
      padding: 40px; 
      border-radius: 20px; 
      box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
      width: 100%; 
      max-width: 400px; 
      text-align: center; 
    }
    h1 { color: #0A0A0A; margin-bottom: 8px; font-size: 24px; }
    p { color: #666; margin-bottom: 24px; font-size: 14px; }
    
    /* Password input wrapper */
    .password-wrapper {
      position: relative;
      width: 100%;
      margin-bottom: 12px;
    }
    .password-wrapper input { 
      width: 100%; 
      padding: 16px 50px 16px 16px; 
      border: 1px solid #E5E5E5; 
      border-radius: 12px; 
      font-size: 16px; 
    }
    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      padding: 4px;
      width: auto;
    }
    
    button { 
      width: 100%; 
      padding: 18px; 
      background: #C9A227; 
      color: #0A0A0A; 
      border: none; 
      border-radius: 12px; 
      font-size: 16px; 
      font-weight: 700; 
      cursor: pointer; 
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .message { 
      margin-top: 16px; 
      padding: 12px; 
      border-radius: 8px; 
      font-size: 14px; 
    }
    .success { background: #DCFCE7; color: #166534; }
    .error { background: #FEE2E2; color: #991B1B; }
    .info { background: #EFF6FF; color: #1E40AF; }
    .logo { font-size: 32px; margin-bottom: 8px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">&#9671;</div>
    <h1>Reset Your Password</h1>
    <p>IvoryOS Account</p>

    <div id="statusMsg" class="message info">
      Initializing...
    </div>

    <div class="password-wrapper hidden" id="passwordWrapper">
      <input type="password" id="newPassword" placeholder="Enter new password (min 6 characters)" minlength="6">
      <button type="button" class="toggle-password" id="toggleBtn" onclick="togglePassword()" title="Show password">👁️</button>
    </div>
    <button id="resetBtn" onclick="resetPassword()" class="hidden">Update Password</button>

    <div id="resultMsg" class="message hidden"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.1/dist/umd/supabase.min.js"></script>

  <script>
    const SUPABASE_URL = 'https://ewqbywvhgujwkqnxvuqi.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV3cWJ5d3ZoZ3Vqd2txbnh2dXFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5NTY3NzMsImV4cCI6MjA5NzUzMjc3M30.lO9JTL4lY1pUm362VgjIIPCVqbR8rSymYx6WD3Swu3o';

    let supabase = null;
    const statusMsg = document.getElementById('statusMsg');
    const resultMsg = document.getElementById('resultMsg');
    const btn = document.getElementById('resetBtn');
    const passwordInput = document.getElementById('newPassword');
    const passwordWrapper = document.getElementById('passwordWrapper');
    const toggleBtn = document.getElementById('toggleBtn');

    function showError(text) {
      resultMsg.className = 'message error';
      resultMsg.textContent = text;
      resultMsg.classList.remove('hidden');
    }

    function showSuccess(text) {
      resultMsg.className = 'message success';
      resultMsg.textContent = text;
      resultMsg.classList.remove('hidden');
    }

    function showInfo(text) {
      statusMsg.className = 'message info';
      statusMsg.textContent = text;
      statusMsg.classList.remove('hidden');
    }

    function hideStatus() {
      statusMsg.classList.add('hidden');
    }

    function showForm() {
      passwordWrapper.classList.remove('hidden');
      btn.classList.remove('hidden');
    }

    function hideForm() {
      passwordWrapper.classList.add('hidden');
      btn.classList.add('hidden');
    }

    function togglePassword() {
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleBtn.textContent = '🙈';
        toggleBtn.title = 'Hide password';
      } else {
        passwordInput.type = 'password';
        toggleBtn.textContent = '👁️';
        toggleBtn.title = 'Show password';
      }
    }

    function getHashParams() {
      const hash = window.location.hash;
      if (!hash || hash.length < 2) return {};

      const params = {};
      const pairs = hash.substring(1).split('&');
      for (const pair of pairs) {
        const [key, value] = pair.split('=');
        if (key && value) {
          params[decodeURIComponent(key)] = decodeURIComponent(value);
        }
      }
      return params;
    }

    async function init() {
      try {
        if (typeof window.supabase === 'undefined' || !window.supabase.createClient) {
          throw new Error('Supabase library failed to load. Please refresh.');
        }

        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const hashParams = getHashParams();
        if (hashParams.error) {
          throw new Error(decodeURIComponent(hashParams.error_description || hashParams.error));
        }

        const accessToken = hashParams.access_token;
        const refreshToken = hashParams.refresh_token;
        const type = hashParams.type;

        if (!accessToken) {
          showError('Invalid or expired reset link. Please request a new password reset from the app.');
          hideStatus();
          return;
        }

        if (type !== 'recovery') {
          showError('Invalid link type. Please request a new password reset from the app.');
          hideStatus();
          return;
        }

        showInfo('Verifying your reset link...');

        const { data, error } = await supabase.auth.setSession({
          access_token: accessToken,
          refresh_token: refreshToken || ''
        });

        if (error) {
          throw new Error('This reset link has expired or is invalid. Please request a new one.');
        }

        if (!data.session) {
          throw new Error('Could not verify your session. Please request a new reset link.');
        }

        hideStatus();
        showForm();
        showSuccess('Reset link verified! Enter your new password above.');

      } catch (err) {
        showError(err.message || 'Something went wrong. Please request a new password reset.');
        hideStatus();
        hideForm();
      }
    }

    async function resetPassword() {
      const password = passwordInput.value.trim();

      if (!password) {
        showError('Please enter a password');
        return;
      }

      if (password.length < 6) {
        showError('Password must be at least 6 characters');
        return;
      }

      if (!supabase) {
        showError('Not initialized. Please refresh the page.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Updating...';
      resultMsg.classList.add('hidden');

      try {
        const { data, error } = await supabase.auth.updateUser({ password: password });

        if (error) {
          throw error;
        }

        showSuccess('Password updated! You can now log back into the IvoryOS app.');
        hideForm();

      } catch (err) {
        showError('Error: ' + (err.message || err.error_description || 'Something went wrong. Please try again.'));
        btn.disabled = false;
        btn.textContent = 'Update Password';
      }
    }

    init();
  </script>
</body>
</html>
