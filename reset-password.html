<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IvoryOS - Reset Password</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #F8F6F0; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
    h1 { color: #0A0A0A; margin-bottom: 8px; font-size: 24px; }
    p { color: #666; margin-bottom: 24px; font-size: 14px; }
    input { width: 100%; padding: 16px; border: 1px solid #E5E5E5; border-radius: 12px; font-size: 16px; margin-bottom: 12px; box-sizing: border-box; }
    button { width: 100%; padding: 18px; background: #C9A227; color: #0A0A0A; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .message { margin-top: 16px; padding: 12px; border-radius: 8px; font-size: 14px; display: none; }
    .success { background: #DCFCE7; color: #166534; display: block; }
    .error { background: #FEE2E2; color: #991B1B; display: block; }
    .logo { font-size: 32px; margin-bottom: 8px; }
  </style>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="container">
    <div class="logo">◇</div>
    <h1>Reset Your Password</h1>
    <p>IvoryOS Account</p>
    <input type="password" id="newPassword" placeholder="Enter new password" minlength="6">
    <button id="resetBtn" onclick="resetPassword()">Update Password</button>
    <div id="message" class="message"></div>
  </div>

  <script>
    const SUPABASE_URL = 'https://ewqbywvhgujwkqnxvuqi.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV3cWJ5d3ZoZ3Vqd2txbnh2dXFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDg3NjE2ODksImV4cCI6MjA2NDMzNzY4OX0.0xNreB7_0F1A1R0LqE1h2Q3R4S5T6U7V8W9X0Y1Z2A3B4C5D6E7F8G9H0I1J2K3L4M5N6O7P8Q9R0S1T2U3V4W5X6Y7Z8';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function resetPassword() {
      const password = document.getElementById('newPassword').value;
      const btn = document.getElementById('resetBtn');
      const msg = document.getElementById('message');

      if (password.length < 6) {
        msg.className = 'message error';
        msg.textContent = 'Password must be at least 6 characters';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Updating...';

      const { error } = await supabase.auth.updateUser({ password });

      if (error) {
        msg.className = 'message error';
        msg.textContent = error.message;
        btn.disabled = false;
        btn.textContent = 'Update Password';
      } else {
        msg.className = 'message success';
        msg.textContent = 'Password updated! You can now log back into the IvoryOS app.';
        btn.style.display = 'none';
        document.getElementById('newPassword').style.display = 'none';
      }
    }
  </script>
</body>
</html>
