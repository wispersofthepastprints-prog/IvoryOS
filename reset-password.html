<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IvoryOS - Reset Password</title>
  <style>
    * { box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      background: #F8F6F0; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: 100vh; 
      margin: 0; 
      padding: 20px;
    }
    .container { 
      background: white; 
      padding: 40px; 
      border-radius: 20px; 
      box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
      width: 100%; 
      max-width: 400px; 
      text-align: center; 
    }
    h1 { color: #0A0A0A; margin-bottom: 8px; font-size: 24px; }
    p { color: #666; margin-bottom: 24px; font-size: 14px; }
    input { 
      width: 100%; 
      padding: 16px; 
      border: 1px solid #E5E5E5; 
      border-radius: 12px; 
      font-size: 16px; 
      margin-bottom: 12px; 
    }
    button { 
      width: 100%; 
      padding: 18px; 
      background: #C9A227; 
      color: #0A0A0A; 
      border: none; 
      border-radius: 12px; 
      font-size: 16px; 
      font-weight: 700; 
      cursor: pointer; 
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .message { 
      margin-top: 16px; 
      padding: 12px; 
      border-radius: 8px; 
      font-size: 14px; 
    }
    .success { background: #DCFCE7; color: #166534; }
    .error { background: #FEE2E2; color: #991B1B; }
    .info { background: #EFF6FF; color: #1E40AF; }
    .logo { font-size: 32px; margin-bottom: 8px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">&#9671;</div>
    <h1>Reset Your Password</h1>
    <p>IvoryOS Account</p>

    <div id="statusMsg" class="message info">
      Initializing...
    </div>

    <input type="password" id="newPassword" placeholder="Enter new password (min 6 characters)" minlength="6">
    <button id="resetBtn" onclick="resetPassword()">Update Password</button>

    <div id="resultMsg" class="message hidden"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.1/dist/umd/supabase.min.js"></script>

  <script>
    const SUPABASE_URL = 'https://ewqbywvhgujwkqnxvuqi.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV3cWJ5d3ZoZ3Vqd2txbnh2dXFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDg3NjE2ODksImV4cCI6MjA2NDMzNzY4OX0.0xNreB7_0F1A1R0LqE1h2Q3R4S5T6U7V8W9X0Y1Z2A3B4C5D6E7F8G9H0I1J2K3L4M5N6O7P8Q9R0S1T2U3V4W5X6Y7Z8';

    let supabase = null;
    const statusMsg = document.getElementById('statusMsg');
    const resultMsg = document.getElementById('resultMsg');
    const btn = document.getElementById('resetBtn');
    const passwordInput = document.getElementById('newPassword');

    function showError(text) {
      resultMsg.className = 'message error';
      resultMsg.textContent = text;
      resultMsg.classList.remove('hidden');
    }

    function showSuccess(text) {
      resultMsg.className = 'message success';
      resultMsg.textContent = text;
      resultMsg.classList.remove('hidden');
    }

    function hideResult() {
      resultMsg.classList.add('hidden');
    }

    function initSupabase() {
      try {
        if (typeof window.supabase !== 'undefined' && window.supabase.createClient) {
          supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
          statusMsg.className = 'message success';
          statusMsg.textContent = 'Ready! Enter your new password above.';
          return true;
        }
      } catch (e) {
        console.error('Supabase init error:', e);
      }
      return false;
    }

    // Try immediately
    if (!initSupabase()) {
      setTimeout(function() {
        if (!initSupabase()) {
          setTimeout(function() {
            if (!initSupabase()) {
              statusMsg.className = 'message error';
              statusMsg.textContent = 'Could not initialize. Please refresh the page or try again later.';
            }
          }, 3000);
        }
      }, 1000);
    }

    async function resetPassword() {
      const password = passwordInput.value.trim();

      if (!password) {
        showError('Please enter a password');
        return;
      }

      if (password.length < 6) {
        showError('Password must be at least 6 characters');
        return;
      }

      if (!supabase) {
        showError('Still initializing. Please wait a moment and try again.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Updating...';
      hideResult();

      try {
        const { data, error } = await supabase.auth.updateUser({ password: password });

        if (error) {
          throw error;
        }

        showSuccess('Password updated! You can now log back into the IvoryOS app.');
        btn.style.display = 'none';
        passwordInput.style.display = 'none';
        statusMsg.style.display = 'none';

      } catch (err) {
        showError('Error: ' + (err.message || err.error_description || 'Something went wrong. Please try again.'));
        btn.disabled = false;
        btn.textContent = 'Update Password';
      }
    }
  </script>
</body>
</html>
