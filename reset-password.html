<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IvoryOS - Reset Password</title>
  <style>
    * { box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      background: #F8F6F0; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: 100vh; 
      margin: 0; 
      padding: 20px;
    }
    .container { 
      background: white; 
      padding: 40px; 
      border-radius: 20px; 
      box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
      width: 100%; 
      max-width: 400px; 
      text-align: center; 
    }
    h1 { color: #0A0A0A; margin-bottom: 8px; font-size: 24px; }
    p { color: #666; margin-bottom: 24px; font-size: 14px; }
    input { 
      width: 100%; 
      padding: 16px; 
      border: 1px solid #E5E5E5; 
      border-radius: 12px; 
      font-size: 16px; 
      margin-bottom: 12px; 
    }
    button { 
      width: 100%; 
      padding: 18px; 
      background: #C9A227; 
      color: #0A0A0A; 
      border: none; 
      border-radius: 12px; 
      font-size: 16px; 
      font-weight: 700; 
      cursor: pointer; 
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .message { 
      margin-top: 16px; 
      padding: 12px; 
      border-radius: 8px; 
      font-size: 14px; 
      word-break: break-all;
    }
    .success { background: #DCFCE7; color: #166534; }
    .error { background: #FEE2E2; color: #991B1B; }
    .info { background: #EFF6FF; color: #1E40AF; }
    .debug { background: #F3F4F6; color: #374151; font-family: monospace; font-size: 11px; text-align: left; }
    .logo { font-size: 32px; margin-bottom: 8px; }
    .hidden { display: none; }
    pre { white-space: pre-wrap; word-break: break-all; margin: 0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">&#9671;</div>
    <h1>Reset Your Password</h1>
    <p>IvoryOS Account</p>

    <div id="statusMsg" class="message info">
      Initializing...
    </div>

    <input type="password" id="newPassword" placeholder="Enter new password (min 6 characters)" minlength="6" class="hidden">
    <button id="resetBtn" onclick="resetPassword()" class="hidden">Update Password</button>

    <div id="resultMsg" class="message hidden"></div>

    <!-- Debug info -->
    <div id="debugInfo" class="message debug hidden"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.1/dist/umd/supabase.min.js"></script>

  <script>
    const SUPABASE_URL = 'https://ewqbywvhgujwkqnxvuqi.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV3cWJ5d3ZoZ3Vqd2txbnh2dXFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDg3NjE2ODksImV4cCI6MjA2NDMzNzY4OX0.0xNreB7_0F1A1R0LqE1h2Q3R4S5T6U7V8W9X0Y1Z2A3B4C5D6E7F8G9H0I1J2K3L4M5N6O7P8Q9R0S1T2U3V4W5X6Y7Z8';

    let supabase = null;
    const statusMsg = document.getElementById('statusMsg');
    const resultMsg = document.getElementById('resultMsg');
    const debugInfo = document.getElementById('debugInfo');
    const btn = document.getElementById('resetBtn');
    const passwordInput = document.getElementById('newPassword');

    function showError(text) {
      resultMsg.className = 'message error';
      resultMsg.textContent = text;
      resultMsg.classList.remove('hidden');
    }

    function showSuccess(text) {
      resultMsg.className = 'message success';
      resultMsg.textContent = text;
      resultMsg.classList.remove('hidden');
    }

    function showInfo(text) {
      statusMsg.className = 'message info';
      statusMsg.textContent = text;
      statusMsg.classList.remove('hidden');
    }

    function hideStatus() {
      statusMsg.classList.add('hidden');
    }

    function showForm() {
      passwordInput.classList.remove('hidden');
      btn.classList.remove('hidden');
    }

    function hideForm() {
      passwordInput.classList.add('hidden');
      btn.classList.add('hidden');
    }

    function showDebug(info) {
      debugInfo.classList.remove('hidden');
      debugInfo.innerHTML = '<pre>' + JSON.stringify(info, null, 2) + '</pre>';
    }

    // Parse ALL params from URL (both query and hash)
    function getAllParams() {
      const all = {};

      // Query params
      const query = window.location.search;
      if (query && query.length > 1) {
        const pairs = query.substring(1).split('&');
        for (const pair of pairs) {
          const [key, value] = pair.split('=');
          if (key) {
            all['query_' + decodeURIComponent(key)] = value ? decodeURIComponent(value) : '';
          }
        }
      }

      // Hash params
      const hash = window.location.hash;
      if (hash && hash.length > 1) {
        const pairs = hash.substring(1).split('&');
        for (const pair of pairs) {
          const [key, value] = pair.split('=');
          if (key) {
            all['hash_' + decodeURIComponent(key)] = value ? decodeURIComponent(value) : '';
          }
        }
      }

      return all;
    }

    async function init() {
      try {
        // Show debug info first
        const debug = {
          fullUrl: window.location.href,
          search: window.location.search,
          hash: window.location.hash,
          allParams: getAllParams()
        };
        showDebug(debug);

        if (typeof window.supabase === 'undefined' || !window.supabase.createClient) {
          throw new Error('Supabase library failed to load. Please refresh.');
        }

        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Check for errors first
        const hashParams = getAllParams();
        if (hashParams.hash_error) {
          throw new Error(decodeURIComponent(hashParams.hash_error_description || hashParams.hash_error));
        }

        // Try ALL possible token locations
        let tokenHash = hashParams.query_token_hash || hashParams.hash_token_hash;
        let accessToken = hashParams.hash_access_token;
        let refreshToken = hashParams.hash_refresh_token;
        let type = hashParams.query_type || hashParams.hash_type;

        // Also check for old "token" param (some Supabase versions use this)
        if (!tokenHash && !accessToken) {
          const oldToken = hashParams.query_token;
          if (oldToken) {
            showInfo('Found legacy token format. Verifying...');
            const { data, error } = await supabase.auth.verifyOtp({
              token_hash: oldToken,
              type: 'recovery'
            });
            if (error) throw error;
            if (!data.session) throw new Error('Could not verify session');
            hideStatus();
            showForm();
            showSuccess('Reset link verified! Enter your new password above.');
            return;
          }
        }

        // Path 1: token_hash in query or hash (PKCE flow)
        if (tokenHash) {
          showInfo('Verifying your reset link...');
          const { data, error } = await supabase.auth.verifyOtp({
            token_hash: tokenHash,
            type: 'recovery'
          });
          if (error) throw error;
          if (!data.session) throw new Error('Could not verify session');
          hideStatus();
          showForm();
          showSuccess('Reset link verified! Enter your new password above.');
          return;
        }

        // Path 2: access_token in hash (implicit flow)
        if (accessToken) {
          showInfo('Verifying your reset link...');
          const { data, error } = await supabase.auth.setSession({
            access_token: accessToken,
            refresh_token: refreshToken || ''
          });
          if (error) throw error;
          if (!data.session) throw new Error('Could not verify session');
          hideStatus();
          showForm();
          showSuccess('Reset link verified! Enter your new password above.');
          return;
        }

        // No token found
        showError('Invalid or expired reset link. Please request a new password reset from the app.');
        hideStatus();

      } catch (err) {
        showError(err.message || 'Something went wrong. Please request a new password reset.');
        hideStatus();
        hideForm();
      }
    }

    async function resetPassword() {
      const password = passwordInput.value.trim();

      if (!password) {
        showError('Please enter a password');
        return;
      }

      if (password.length < 6) {
        showError('Password must be at least 6 characters');
        return;
      }

      if (!supabase) {
        showError('Not initialized. Please refresh the page.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Updating...';
      resultMsg.classList.add('hidden');

      try {
        const { data, error } = await supabase.auth.updateUser({ password: password });

        if (error) {
          throw error;
        }

        showSuccess('Password updated! You can now log back into the IvoryOS app.');
        hideForm();

      } catch (err) {
        showError('Error: ' + (err.message || err.error_description || 'Something went wrong. Please try again.'));
        btn.disabled = false;
        btn.textContent = 'Update Password';
      }
    }

    init();
  </script>
</body>
</html>
